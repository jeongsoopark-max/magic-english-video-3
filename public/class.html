<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>화상 수업 입장 - MAGIC ENGLISH</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Landing / join screen -->
  <div id="join-screen" class="screen">
    <div class="join-card">
      <a href="index.html" style="display:inline-block;color:#9497a6;font-size:12px;text-decoration:none;margin-bottom:10px;">← 홈으로</a>
      <h1>Video Class</h1>
      <p class="subtitle">소규모 화상 수업 (최대 10명)</p>

      <label for="name-input">이름</label>
      <input id="name-input" type="text" placeholder="예: 정수" maxlength="40" autocomplete="name">

      <label for="room-input">수업 코드</label>
      <div class="room-row">
        <input id="room-input" type="text" placeholder="예: choi-mon" maxlength="40" autocomplete="off">
        <button id="generate-room-btn" type="button" title="랜덤 코드 생성">랜덤</button>
      </div>

      <label class="checkbox-row">
        <input id="approval-checkbox" type="checkbox">
        <span>입장 승인 필요 (대기실)</span>
      </label>
      <p class="hint small">체크하고 이 수업 코드로 처음 입장하면 내가 선생님이 되고, 이후 들어오는 사람은 내가 승인해야 입장할 수 있어요.</p>

      <button id="join-btn" type="button" class="primary-btn">입장하기</button>
      <p id="join-error" class="error-text"></p>

      <p class="hint">같은 수업 코드를 입력한 사람끼리 같은 방에 모입니다. 학생에게 이 페이지 링크와 수업 코드를 공유하세요.</p>
    </div>
  </div>

  <!-- Waiting-for-approval screen -->
  <div id="waiting-screen" class="screen hidden">
    <div class="join-card">
      <div class="spinner"></div>
      <h1>입장 승인 대기 중</h1>
      <p class="subtitle">선생님이 입장을 승인하면 자동으로 연결됩니다...</p>
      <button id="cancel-wait-btn" type="button" class="control-btn">취소</button>
    </div>
  </div>

  <!-- In-call screen -->
  <div id="call-screen" class="screen hidden">
    <header class="call-header">
      <span id="room-label"></span>
      <span id="participant-count"></span>
      <div class="pending-wrap">
        <button id="pending-btn" type="button" class="hidden">대기 중인 참가자 <span id="pending-count">0</span></button>
        <div id="pending-panel" class="pending-panel hidden"></div>
      </div>
      <button id="toggle-chat-btn" type="button">채팅</button>
    </header>

    <main class="call-main">
      <div id="video-grid" class="video-grid"></div>

      <aside id="chat-panel" class="chat-panel hidden">
        <div id="chat-log" class="chat-log"></div>
        <form id="chat-form" class="chat-form">
          <input id="chat-input" type="text" placeholder="메시지 입력..." maxlength="1000" autocomplete="off">
          <button type="submit">전송</button>
        </form>
      </aside>
    </main>

    <footer class="controls-bar">
      <button id="mic-btn" type="button" class="control-btn">마이크 끄기</button>
      <button id="cam-btn" type="button" class="control-btn">카메라 끄기</button>
      <button id="screen-btn" type="button" class="control-btn">화면 공유</button>
      <div class="bg-picker-wrap">
        <button id="bg-btn" type="button" class="control-btn">배경</button>
        <div id="bg-panel" class="bg-panel hidden">
          <div class="bg-panel-header">배경 및 효과</div>

          <div class="bg-row">
            <button type="button" class="bg-option" data-bg="none"><span class="bg-swatch bg-swatch-none">✕</span>없음</button>
            <button type="button" class="bg-option" data-bg="blur"><span class="bg-swatch bg-swatch-blur"></span>블러</button>
          </div>

          <div class="bg-category">전문적</div>
          <div class="bg-row">
            <button type="button" class="bg-option" data-bg="study"><span class="bg-swatch" style="background-image:url('backgrounds/study.png')"></span>서재</button>
            <button type="button" class="bg-option" data-bg="office"><span class="bg-swatch" style="background-image:url('backgrounds/office.png')"></span>오피스</button>
            <button type="button" class="bg-option" data-bg="simple"><span class="bg-swatch" style="background-image:url('backgrounds/simple.png')"></span>심플</button>
          </div>

          <div class="bg-category">아늑한 집</div>
          <div class="bg-row">
            <button type="button" class="bg-option" data-bg="cafe"><span class="bg-swatch" style="background-image:url('backgrounds/cafe.png')"></span>카페</button>
            <button type="button" class="bg-option" data-bg="living"><span class="bg-swatch" style="background-image:url('backgrounds/living.png')"></span>거실</button>
            <button type="button" class="bg-option" data-bg="nook"><span class="bg-swatch" style="background-image:url('backgrounds/nook.png')"></span>독서공간</button>
          </div>

          <div class="bg-category">새 배경</div>
          <div class="bg-row">
            <button type="button" class="bg-option" data-bg="cozy"><span class="bg-swatch" style="background-image:url('backgrounds/cozy.png')"></span>우드룸</button>
            <button type="button" class="bg-option" data-bg="shelf"><span class="bg-swatch" style="background-image:url('backgrounds/bright_shelf.png')"></span>선반</button>
          </div>
          <div class="bg-row">
            <button type="button" class="bg-option" data-bg="lake1"><span class="bg-swatch" style="background-image:url('backgrounds/lake1.png')"></span>테나야 호수</button>
            <button type="button" class="bg-option" data-bg="lake2"><span class="bg-swatch" style="background-image:url('backgrounds/lake2.png')"></span>산길</button>
          </div>
        </div>
      </div>
      <button id="leave-btn" type="button" class="control-btn leave-btn">나가기</button>
    </footer>
  </div>

  <!-- Off-screen elements used to build the virtual-background video stream.
       Not shown to the user directly. -->
  <video id="bg-source-video" autoplay playsinline muted style="display:none;"></video>
  <canvas id="bg-canvas" width="640" height="480" style="display:none;"></canvas>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/selfie_segmentation/selfie_segmentation.js" crossorigin="anonymous"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="client.js"></script>
</body>
</html>
